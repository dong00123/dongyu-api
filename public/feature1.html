<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深度理解 - 东玉搜索</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #1a1a2e;
            --accent: #e94560;
            --accent-light: #ff6b6b;
            --bg: #0f0f1a;
            --surface: #16213e;
            --text: #eaeaea;
            --text-secondary: #a0a0b0;
        }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding-top: 80px;
        }
        .back-btn {
            color: var(--accent-light);
            text-decoration: none;
            margin-bottom: 2rem;
            display: inline-block;
        }
        .page-title {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #fff, var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .content {
            line-height: 1.8;
            color: var(--text-secondary);
            font-size: 1.05rem;
        }
        .content p {
            margin-bottom: 1rem;
        }
        .highlight {
            color: var(--accent-light);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回首页</a>
        <h1 class="page-title">🧠 深度理解</h1>
        <div class="content">
            <p>东玉搜索的<strong class="highlight">深度理解能力</strong>，基于大模型的语义解析技术，彻底告别传统搜索引擎的“关键词匹配”局限。</p>
            <p>它能读懂你的复杂问句、上下文语境和隐含需求，比如你问“北京最近天气怎么样，适合穿什么衣服？”，它会同时理解“天气”和“穿搭建议”两个需求，给出完整的回答。</p>
            <p>依托强大的语义理解模型，它能识别口语化表达、歧义句和多轮对话中的指代关系，让搜索更懂你的真实意图，而不是只返回一堆无关的网页链接。</p>
        </div>
    </div>
</body>
</html>
