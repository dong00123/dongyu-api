<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于 - 东玉搜索</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #1a1a2e;
            --accent: #e94560;
            --accent-light: #ff6b6b;
            --bg: #0f0f1a;
            --surface: #16213e;
            --text: #eaeaea;
            --text-secondary: #a0a0b0;
        }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding-top: 80px;
        }
        .back-btn {
            color: var(--accent-light);
            text-decoration: none;
            margin-bottom: 2rem;
            display: inline-block;
        }
        .page-title {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #fff, var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .content {
            line-height: 1.8;
            color: var(--text-secondary);
            font-size: 1.05rem;
        }
        .highlight {
            color: var(--accent-light);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回首页</a>
        <h1 class="page-title">关于东玉</h1>
        <div class="content">
            <p>东玉搜索是一款基于大模型的智能搜索引擎，致力于为用户提供更精准、更高效的搜索体验。</p>
            <p>我们的目标是让搜索不再局限于关键词匹配，而是真正理解你的意图，给你想要的答案。</p>
            <p>© 2026 东玉 DongYu. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
