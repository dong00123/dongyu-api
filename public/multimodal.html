<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多模态解析 - 东玉</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a2e;
            --accent: #e94560;
            --accent-light: #ff6b6b;
            --bg: #0f0f1a;
            --surface: #16213e;
            --border: #2a2a4a;
            --text: #eaeaea;
            --text-secondary: #a0a0b0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 15, 26, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), #0f3460);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
        }
        .back-link:hover {
            color: var(--accent-light);
        }

        /* 主内容 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 120px 2rem 4rem;
        }

        .page-title {
            text-align: center;
            margin-bottom: 2rem;
        }

        .page-title h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #fff 0%, var(--accent-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .page-title p {
            color: var(--text-secondary);
        }

        /* 上传区域 */
        .upload-area {
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 3rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1.5rem;
        }
        .upload-area:hover {
            border-color: var(--accent);
            background: rgba(233, 69, 96, 0.08);
        }
        .upload-area.uploaded {
            border-style: solid;
        }

        .upload-icon {
            font-size: 3rem;
            color: var(--accent-light);
            margin-bottom: 1rem;
        }

        .upload-tip {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .preview-img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin-top: 1rem;
            display: none;
        }

        /* 快捷按钮组 */
        .quick-btn-group {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .quick-btn {
            padding: 0.6rem 1.2rem;
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 20px;
            color: var(--accent-light);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .quick-btn:hover {
            background: rgba(233, 69, 96, 0.2);
            transform: translateY(-2px);
        }
        .quick-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 提问区域 */
        .input-area {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .question-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 1rem;
            resize: none;
            min-height: 80px;
            font-family: inherit;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.3);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 结果区域 */
        .result-area {
            display: none;
        }
        .result-area.active {
            display: block;
        }

        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .result-title {
            color: var(--accent-light);
            margin-bottom: 0.8rem;
            font-weight: 600;
        }

        .result-content {
            color: var(--text-secondary);
            line-height: 1.8;
            white-space: pre-wrap;
        }

        /* 加载 */
        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }
        .loading.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(233, 69, 96, 0.3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <!-- 引入Tesseract.js -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">
            <div class="logo-icon">东</div>
            <span>东玉</span>
        </a>
        <a href="index.html" class="back-link">← 返回首页</a>
    </nav>

    <div class="container">
        <div class="page-title">
            <h1>多模态解析</h1>
            <p>上传图片，一键OCR识别 + 图文提问，让模型理解内容</p>
        </div>

        <!-- 上传区域 -->
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">🖼️</div>
            <div class="upload-tip">点击或拖拽上传图片（支持 JPG/PNG，最大 5MB）</div>
            <img class="preview-img" id="previewImg" alt="图片预览">
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
        </div>

        <!-- 快捷按钮组 -->
        <div class="quick-btn-group">
            <button class="quick-btn" id="ocrBtn" disabled>📝 一键OCR识别文字</button>
            <button class="quick-btn" id="describeBtn" disabled>📄 描述图片内容</button>
        </div>

        <!-- 提问区域 -->
        <div class="input-area">
            <textarea class="question-input" id="questionInput" placeholder="输入你想了解的问题，例如：帮我识别文字、描述这张图片、写一段文案..."></textarea>
        </div>

        <button class="submit-btn" id="submitBtn">提交解析</button>

        <!-- 加载 -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color: var(--text-secondary);">模型正在解析中...</p>
        </div>

        <!-- 结果区域 -->
        <div class="result-area" id="resultArea">
            <div class="result-card">
                <div class="result-title" id="resultTitle">解析结果</div>
                <div class="result-content" id="resultContent"></div>
            </div>
        </div>
    </div>

<script>
    const uploadArea = document.getElementById('uploadArea');
    const imageInput = document.getElementById('imageInput');
    const previewImg = document.getElementById('previewImg');
    const questionInput = document.getElementById('questionInput');
    const submitBtn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const resultArea = document.getElementById('resultArea');
    const resultTitle = document.getElementById('resultTitle');
    const resultContent = document.getElementById('resultContent');
    const ocrBtn = document.getElementById('ocrBtn');
    const describeBtn = document.getElementById('describeBtn');

    let selectedImageBase64 = null;

    // 点击上传
    uploadArea.addEventListener('click', () => imageInput.click());

    // 拖拽上传
    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = 'var(--accent)';
    });
    uploadArea.addEventListener('dragleave', () => {
        uploadArea.style.borderColor = 'var(--border)';
    });
    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = 'var(--border)';
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
            handleImage(file);
        }
    });

    // 选择文件
    imageInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) handleImage(file);
    });

    // 处理图片预览 + base64
    function handleImage(file) {
        if (file.size > 5 * 1024 * 1024) {
            alert('图片大小不能超过 5MB');
            return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
            selectedImageBase64 = e.target.result;
            previewImg.src = selectedImageBase64;
            previewImg.style.display = 'block';
            uploadArea.classList.add('uploaded');
            uploadArea.querySelector('.upload-tip').innerText = '已上传图片，可继续提问或更换图片';
            
            // 启用快捷按钮
            ocrBtn.disabled = false;
            describeBtn.disabled = false;
        };
        reader.readAsDataURL(file);
    }

    // 🔧 优化版：图片预处理（提高OCR准确率）
    function preprocessImage(base64) {
        return new Promise((resolve) => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            img.onload = () => {
                // 放大图片（提升文字清晰度）
                const scale = 2;
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                // 灰度处理 + 对比度增强
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    // 灰度
                    const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                    // 增强对比度
                    const contrast = 1.5;
                    const gray = ((avg / 255 - 0.5) * contrast + 0.5) * 255;
                    const clamped = Math.max(0, Math.min(255, gray));
                    data[i] = clamped;
                    data[i + 1] = clamped;
                    data[i + 2] = clamped;
                }
                ctx.putImageData(imageData, 0, 0);
                resolve(canvas.toDataURL('image/png'));
            };
            img.src = base64;
        });
    }

    // 一键OCR识别文字（优化版）
    ocrBtn.addEventListener('click', async () => {
        if (!selectedImageBase64) return;
        
        ocrBtn.disabled = true;
        loading.classList.add('active');
        resultArea.classList.remove('active');

        try {
            // 先预处理图片
            const processedImage = await preprocessImage(selectedImageBase64);

            // 使用优化配置识别（优先英文，再中文）
            const result = await Tesseract.recognize(
                processedImage,
                'eng+chi_sim',
                {
                    logger: m => console.log(m),
                    // 关键配置：提升印刷体识别准确率
                    psm: 6, // 假设为单个统一文本块
                    oem: 3, // 默认OCR引擎
                }
            );

            let text = result.data.text.trim();
            // 清理识别结果中的乱码符号
            text = text.replace(/[^\x20-\x7E\u4E00-\u9FA5]/g, '').replace(/\s+/g, '\n').trim();

            if (text) {
                resultTitle.innerText = 'OCR识别结果';
                resultContent.innerText = `识别到的文字：\n\n${text}`;
            } else {
                resultTitle.innerText = 'OCR识别结果';
                resultContent.innerText = '未识别到任何文字，可能是图片模糊或文字不清晰';
            }
            resultArea.classList.add('active');
        } catch (error) {
            console.error(error);
            resultTitle.innerText = 'OCR识别失败';
            resultContent.innerText = '识别出错，请稍后重试';
            resultArea.classList.add('active');
        } finally {
            loading.classList.remove('active');
            ocrBtn.disabled = false;
        }
    });

    // 快捷提问：描述图片内容
    describeBtn.addEventListener('click', () => {
        questionInput.value = '请描述这张图片的内容';
        questionInput.focus();
    });

    // 提交解析（模拟接口，可替换为真实多模态API）
    submitBtn.addEventListener('click', async () => {
        const question = questionInput.value.trim();
        if (!selectedImageBase64) {
            alert('请先上传一张图片');
            return;
        }
        if (!question) {
            alert('请输入你的问题');
            return;
        }

        loading.classList.add('active');
        resultArea.classList.remove('active');
        submitBtn.disabled = true;

        try {
            // 模拟接口请求延迟
            await new Promise(resolve => setTimeout(resolve, 1200));

            // 根据问题内容，模拟不同的返回结果
            let answer = '';
            if (question.includes('英文') || question.includes('文字') || question.includes('ocr')) {
                answer = `识别结果：\n图片中的英文是："A boy and a girl are reading by the river"\n中文翻译：一个男孩和一个女孩正在河边读书`;
            } else if (question.includes('描述') || question.includes('图片内容')) {
                answer = `图片内容解析：\n画面里是一男一女两个孩子，坐在河边的草地上看书，阳光洒在他们身上，整体氛围很安静、很治愈。`;
            } else {
                answer = `基于你上传的图片和问题「${question}」，我的回答：\n这是一幅描绘“两个孩子在河边阅读”的插画，画风柔和温暖。你可以试试让我帮你识别文字、描述画面或写一段相关文案。`;
            }

            resultTitle.innerText = '解析结果';
            resultContent.innerText = answer;
            resultArea.classList.add('active');
        } catch (error) {
            console.error(error);
            resultTitle.innerText = '解析出错';
            resultContent.innerText = '解析出错，请稍后重试';
            resultArea.classList.add('active');
        } finally {
            loading.classList.remove('active');
            submitBtn.disabled = false;
        }
    });
</script>
</body>
</html>
