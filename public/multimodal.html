<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多模态解析 - 东玉</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a2e;
            --accent: #e94560;
            --accent-light: #ff6b6b;
            --bg: #0f0f1a;
            --surface: #16213e;
            --border: #2a2a4a;
            --text: #eaeaea;
            --text-secondary: #a0a0b0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 15, 26, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), #0f3460);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
        }
        .back-link:hover {
            color: var(--accent-light);
        }

        /* 主内容 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 120px 2rem 4rem;
        }

        .page-title {
            text-align: center;
            margin-bottom: 2rem;
        }

        .page-title h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #fff 0%, var(--accent-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .page-title p {
            color: var(--text-secondary);
        }

        /* 上传区域 */
        .upload-area {
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 3rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1.5rem;
        }
        .upload-area:hover {
            border-color: var(--accent);
            background: rgba(233, 69, 96, 0.08);
        }
        .upload-area.uploaded {
            border-style: solid;
        }

        .upload-icon {
            font-size: 3rem;
            color: var(--accent-light);
            margin-bottom: 1rem;
        }

        .upload-tip {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .preview-img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin-top: 1rem;
            display: none;
        }

        /* 提问区域 */
        .input-area {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .question-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 1rem;
            resize: none;
            min-height: 80px;
            font-family: inherit;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.3);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 结果区域 */
        .result-area {
            margin-top: 2rem;
            display: none;
        }
        .result-area.active {
            display: block;
        }

        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
        }

        .result-title {
            color: var(--accent-light);
            margin-bottom: 0.8rem;
            font-weight: 600;
        }

        .result-content {
            color: var(--text-secondary);
            line-height: 1.8;
            white-space: pre-wrap;
        }

        /* 加载 */
        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }
        .loading.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(233, 69, 96, 0.3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">
            <div class="logo-icon">东</div>
            <span>东玉</span>
        </a>
        <a href="index.html" class="back-link">← 返回首页</a>
    </nav>

    <div class="container">
        <div class="page-title">
            <h1>多模态解析</h1>
            <p>上传图片，搭配文字提问，让模型理解图文内容</p>
        </div>

        <!-- 上传区域 -->
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">🖼️</div>
            <div class="upload-tip">点击或拖拽上传图片（支持 JPG/PNG，最大 5MB）</div>
            <img class="preview-img" id="previewImg" alt="图片预览">
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
        </div>

        <!-- 提问区域 -->
        <div class="input-area">
            <textarea class="question-input" id="questionInput" placeholder="输入你想了解的问题，例如：描述这张图片的内容、帮我识别这张试卷的题目..."></textarea>
        </div>

        <button class="submit-btn" id="submitBtn">提交解析</button>

        <!-- 加载 -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color: var(--text-secondary);">模型正在解析中...</p>
        </div>

        <!-- 结果区域 -->
        <div class="result-area" id="resultArea">
            <div class="result-card">
                <div class="result-title">解析结果</div>
                <div class="result-content" id="resultContent"></div>
            </div>
        </div>
    </div>

<script>
    const uploadArea = document.getElementById('uploadArea');
    const imageInput = document.getElementById('imageInput');
    const previewImg = document.getElementById('previewImg');
    const questionInput = document.getElementById('questionInput');
    const submitBtn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const resultArea = document.getElementById('resultArea');
    const resultContent = document.getElementById('resultContent');

    let selectedImageBase64 = null;

    // 点击上传
    uploadArea.addEventListener('click', () => imageInput.click());

    // 拖拽上传
    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = 'var(--accent)';
    });
    uploadArea.addEventListener('dragleave', () => {
        uploadArea.style.borderColor = 'var(--border)';
    });
    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = 'var(--border)';
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
            handleImage(file);
        }
    });

    // 选择文件
    imageInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) handleImage(file);
    });

    // 处理图片预览 + base64
    function handleImage(file) {
        if (file.size > 5 * 1024 * 1024) {
            alert('图片大小不能超过 5MB');
            return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
            selectedImageBase64 = e.target.result;
            previewImg.src = selectedImageBase64;
            previewImg.style.display = 'block';
            uploadArea.classList.add('uploaded');
            uploadArea.querySelector('.upload-tip').innerText = '已上传图片，可继续提问或更换图片';
        };
        reader.readAsDataURL(file);
    }

    // 提交解析（这里你可以替换成你的多模态接口）
    submitBtn.addEventListener('click', async () => {
        const question = questionInput.value.trim();
        if (!selectedImageBase64) {
            alert('请先上传一张图片');
            return;
        }
        if (!question) {
            alert('请输入你的问题');
            return;
        }

        // 显示加载
        loading.classList.add('active');
        resultArea.classList.remove('active');
        submitBtn.disabled = true;

        try {
            // 这里是示例，你可以替换成你的多模态 API 调用
            // const response = await fetch('/api/multimodal', {
            //     method: 'POST',
            //     headers: { 'Content-Type': 'application/json' },
            //     body: JSON.stringify({
            //         image: selectedImageBase64,
            //         question: question
            //     })
            // });
            // const data = await response.json();
            // const answer = data.answer || '解析失败';

            // 模拟接口返回
            await new Promise(resolve => setTimeout(resolve, 1500));
            const answer = `基于你上传的图片和问题「${question}」，模型的解析结果：\n\n（这里是你的多模态模型返回的文本内容，你对接接口后会自动替换）`;

            resultContent.innerText = answer;
            resultArea.classList.add('active');
        } catch (error) {
            console.error(error);
            resultContent.innerText = '解析出错，请稍后重试';
            resultArea.classList.add('active');
        } finally {
            loading.classList.remove('active');
            submitBtn.disabled = false;
        }
    });
</script>
</body>
</html>
