<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Agent | 智能旅行规划引擎</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", "Noto Sans SC", system-ui, sans-serif;
}

:root {
    --bg-main: #070814;
    --bg-card: rgba(18, 20, 38, 0.75);
    --border-glass: rgba(124, 140, 255, 0.12);
    --accent-primary: #7c8cff;
    --accent-gradient: linear-gradient(135deg, #7c8cff 0%, #ff6bcb 100%);
    --text-white: #f7f8ff;
    --text-gray: #a9b2d3;
    --shadow-glow: 0 0 35px rgba(124, 140, 255, 0.18);
}

body {
    background-color: var(--bg-main);
    background-image:
        radial-gradient(circle at 15% 10%, rgba(124, 140, 255, 0.08) 0%, transparent 45%),
        radial-gradient(circle at 85% 75%, rgba(255, 107, 203, 0.06) 0%, transparent 40%);
    min-height: 100vh;
    padding: 48px 24px;
    color: var(--text-white);
}

.container {
    max-width: 1440px;
    margin: 0 auto;
}

/* 头部标题区域 */
.page-header {
    text-align: center;
    margin-bottom: 52px;
}
.page-header h1 {
    font-size: 46px;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 12px;
}
.page-header p {
    color: var(--text-gray);
    font-size: 15px;
    max-width: 680px;
    margin: 0 auto;
    line-height: 1.7;
}
.tip-tag-group {
    margin-top: 16px;
    display: flex;
    gap: 12px;
    justify-content: center;
}
.tip-tag {
    padding: 6px 14px;
    border: 1px solid var(--border-glass);
    border-radius: 999px;
    font-size: 12px;
    color: var(--text-gray);
    backdrop-filter: blur(6px);
}

/* 双栏主布局 */
.main-grid {
    display: grid;
    grid-template-columns: 440px 1fr;
    gap: 28px;
}

/* 玻璃态卡片通用 */
.glass-card {
    background: var(--bg-card);
    border: 1px solid var(--border-glass);
    border-radius: 20px;
    padding: 32px;
    backdrop-filter: blur(18px);
    box-shadow: var(--shadow-glow);
}
.card-title {
    font-size: 20px;
    font-weight: 600;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border-glass);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 10px;
}
.card-title::before {
    content: "";
    width: 4px;
    height: 20px;
    border-radius: 2px;
    background: var(--accent-gradient);
}

/* 表单布局 */
.form-grid-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-bottom: 22px;
}
.form-item {
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.form-full {
    margin-bottom: 22px;
}
.form-item label {
    font-size: 13px;
    color: var(--text-gray);
}
.form-item input,
.form-item select,
.form-item textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border-glass);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text-white);
    font-size: 14px;
    outline: none;
    transition: 0.25s ease;
}
.form-item input:focus,
.form-item select:focus,
.form-item textarea:focus {
    border-color: var(--accent-primary);
    box-shadow: 0 0 0 3px rgba(124, 140, 255, 0.15);
    background: rgba(255,255,255,0.07);
}
textarea {
    min-height: 110px;
    resize: none;
}

/* 生成按钮 */
.generate-btn {
    width: 100%;
    padding: 14px 0;
    border-radius: 12px;
    border: none;
    background: var(--accent-gradient);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 10px;
}
.generate-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(124, 140, 255, 0.3);
}
.generate-btn:active {
    transform: translateY(0);
}
.generate-btn:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

/* 右侧结果区域 */
.result-wrap {
    min-height: 620px;
}
.empty-placeholder {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-gray);
    gap: 12px;
    padding: 40px;
    text-align: center;
}
.empty-placeholder svg {
    opacity: 0.35;
    margin-bottom: 8px;
}

/* 结果内容样式（适配后端返回HTML class） */
.result-block {
    margin-bottom: 36px;
}
.result-block h4 {
    font-size: 17px;
    margin-bottom: 14px;
    color: var(--accent-primary);
    font-weight: 600;
}
.result-text {
    line-height: 1.8;
    color: var(--text-gray);
    font-size: 14.5px;
}
.item-line {
    padding: 12px 16px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    border-left: 3px solid var(--accent-primary);
}
.date-item {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px dashed var(--border-glass);
    color: var(--text-gray);
}
.day-plan {
    padding: 16px;
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    margin-bottom: 14px;
    line-height: 1.75;
    color: var(--text-gray);
}

/* 加载动画 */
.loading-skeleton {
    display: flex;
    flex-direction: column;
    gap: 16px;
}
.skeleton-line {
    height: 22px;
    background: linear-gradient(90deg, rgba(124,140,255,0.08) 25%, rgba(124,140,255,0.16) 50%, rgba(124,140,255,0.08) 75%);
    background-size: 200% 100%;
    border-radius: 6px;
    animation: skeletonShine 1.4s infinite;
}
@keyframes skeletonShine {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

/* 响应式适配移动端 */
@media (max-width: 1024px) {
    .main-grid {
        grid-template-columns: 1fr;
    }
    .page-header h1 {
        font-size: 34px;
    }
}
</style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <h1>Travel Agent 智能旅行规划引擎</h1>
        <p>整合实时机票、高铁票务、目的地住宿与全域景点数据，由大模型自动生成可落地的全套私人旅行方案，一键完成行程规划</p>
        <div class="tip-tag-group">
            <span class="tip-tag">完整行程生成</span>
            <span class="tip-tag">仅查询交通票务</span>
            <span class="tip-tag">目的地住宿推荐</span>
        </div>
    </div>

    <div class="main-grid">
        <!-- 左侧表单面板 -->
        <div class="glass-card">
            <h2 class="card-title">行程参数配置</h2>
            <div class="form-grid-row">
                <div class="form-item">
                    <label>出发城市</label>
                    <input id="startCity" value="北京" placeholder="如：南阳、上海">
                </div>
                <div class="form-item">
                    <label>目的地城市</label>
                    <input id="endCity" value="郑州" placeholder="如：西安、杭州">
                </div>
            </div>
            <div class="form-grid-row">
                <div class="form-item">
                    <label>行程起始日期</label>
                    <input type="date" id="startDate" value="2026-07-10">
                </div>
                <div class="form-item">
                    <label>行程结束日期</label>
                    <input type="date" id="endDate" value="2026-07-12">
                </div>
            </div>
            <div class="form-grid-row">
                <div class="form-item">
                    <label>出行人数</label>
                    <input type="number" id="personNum" min="1" value="3">
                </div>
                <div class="form-item">
                    <label>整体预算（元）</label>
                    <input type="number" id="budget" min="0" value="10000">
                </div>
            </div>
            <div class="form-grid-row">
                <div class="form-item">
                    <label>生成模式</label>
                    <select id="reqType">
                        <option value="full">✅ 完整全套方案</option>
                        <option value="train">🚄 仅查询火车票</option>
                        <option value="flight">✈️ 仅查询机票</option>
                        <option value="hotel">🏨 仅推荐住宿</option>
                    </select>
                </div>
            </div>
            <div class="form-full form-item">
                <label>个性化出行偏好</label>
                <textarea id="pref" placeholder="例如：酒店靠近地铁口、优先本地特色美食、少换乘少赶路、偏向人文古迹打卡、避开网红人流景点">酒店靠近地铁、想吃本地美食、少赶路、偏爱人文古迹</textarea>
            </div>
            <button class="generate-btn" id="genBtn">🚀 一键生成专属旅行方案</button>
        </div>

        <!-- 右侧结果展示面板 -->
        <div class="glass-card result-wrap">
            <h2 class="card-title">规划方案输出</h2>
            <div id="resultBox">
                <div class="empty-placeholder">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#7c8cff" stroke-width="1.2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    <p>填写左侧行程信息并点击生成按钮</p>
                    <p style="font-size:12px;">系统自动拉取票务实时数据，AI生成结构化旅行计划</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const API_BASE = "";
const genBtn = document.getElementById('genBtn');
const resultBox = document.getElementById('resultBox');

genBtn.onclick = async ()=>{
    const startCity = document.getElementById('startCity').value.trim();
    const endCity = document.getElementById('endCity').value.trim();
    const startDate = document.getElementById('startDate').value;
    const endDate = document.getElementById('endDate').value;
    const personNum = document.getElementById('personNum').value;
    const budget = document.getElementById('budget').value;
    const reqType = document.getElementById('reqType').value;
    const pref = document.getElementById('pref').value.trim();

    if(!startCity||!endCity||!startDate||!endDate){
        alert('请完整填写出发地、目的地与起止日期');
        return;
    }

    genBtn.disabled = true;
    // 骨架加载占位
    resultBox.innerHTML = `
    <div class="loading-skeleton">
        <div class="skeleton-line" style="width:75%;"></div>
        <div class="skeleton-line" style="width:90%;"></div>
        <div class="skeleton-line" style="width:65%;"></div>
        <div class="skeleton-line" style="width:82%;"></div>
        <div class="skeleton-line" style="width:55%;"></div>
    </div>
    `;

    try{
        const res = await fetch(`${API_BASE}/api/travel`,{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                startCity,endCity,startDate,endDate,personNum,budget,reqType,pref
            })
        });
        const data = await res.json();
        resultBox.innerHTML = data.html;
    }catch(err){
        resultBox.innerHTML = `<div style="color:#ff7b92;padding:20px;border:1px solid rgba(255,123,146,0.2);border-radius:12px;">❌ 请求异常：${err.message}<br>请确认后端服务正常部署运行</div>`;
    }finally{
        genBtn.disabled = false;
    }
}
</script>
</body>
</html>
