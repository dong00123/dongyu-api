<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>东玉 - 智能搜索</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a2e;
            --accent: #e94560;
            --accent-light: #ff6b6b;
            --bg: #0f0f1a;
            --surface: #16213e;
            --surface-light: #1a1a3e;
            --text: #eaeaea;
            --text-secondary: #a0a0b0;
            --border: #2a2a4a;
            --gradient-start: #e94560;
            --gradient-end: #0f3460;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 动态背景 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            top: -25%;
            left: -25%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(233, 69, 96, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(15, 52, 96, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(233, 69, 96, 0.1) 0%, transparent 40%);
            animation: bgMove 20s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(1deg); }
            66% { transform: translate(-20px, 20px) rotate(-1deg); }
        }

        /* 粒子效果 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(233, 69, 96, 0.6);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }

        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 15, 26, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--text);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-btn {
            padding: 0.6rem 1.4rem;
            background: linear-gradient(135deg, var(--gradient-start), var(--accent-light));
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: 500;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
        }

        /* 主内容区 */
        .main-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            padding-top: 80px;
        }

        /* 标题区域 */
        .hero-section {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInUp 1s ease-out;
        }

        .hero-title {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, var(--accent-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
        }

        .hero-subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.8;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem;
            background: rgba(233, 69, 96, 0.15);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--accent-light);
            margin-bottom: 1.5rem;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* 搜索框 */
        .search-container {
            width: 100%;
            max-width: 800px;
            position: relative;
            animation: fadeInUp 1s ease-out 0.2s both;
        }

        .search-box {
            width: 100%;
            padding: 1.2rem 1.5rem;
            padding-right: 120px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 16px;
            color: var(--text);
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .search-box::placeholder {
            color: var(--text-secondary);
        }

        .search-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.2), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            padding: 0.8rem 1.8rem;
            background: linear-gradient(135deg, var(--gradient-start), var(--accent-light));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .search-btn:hover {
            transform: translateY(-50%) scale(1.05);
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.5);
        }

        .search-btn:active {
            transform: translateY(-50%) scale(0.98);
        }

        .search-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 快捷标签 */
        .quick-tags {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        .tag {
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tag:hover {
            background: rgba(233, 69, 96, 0.15);
            border-color: rgba(233, 69, 96, 0.4);
            color: var(--accent-light);
            transform: translateY(-2px);
        }

        /* 特性卡片 */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            max-width: 1000px;
            width: 100%;
            margin-top: 4rem;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .feature-card {
            background: rgba(22, 33, 62, 0.6);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 1.8rem;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .feature-card:hover {
            transform: translateY(-5px);
            border-color: rgba(233, 69, 96, 0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .feature-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .feature-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .feature-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* 搜索结果区域 */
        .results-area {
            width: 100%;
            max-width: 900px;
            margin-top: 2rem;
            display: none;
        }

        .results-area.active {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }

        .result-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }

        .result-item:hover {
            border-color: rgba(233, 69, 96, 0.3);
            transform: translateX(5px);
        }

        .result-title {
            color: var(--accent-light);
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .result-desc {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .result-meta {
            color: #4ade80;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        /* 加载动画 */
        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(233, 69, 96, 0.3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 错误提示 */
        .error-msg {
            background: rgba(233, 69, 96, 0.15);
            border: 1px solid rgba(233, 69, 96, 0.4);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            color: var(--accent-light);
            margin-bottom: 1rem;
        }

        /* 页脚 */
        footer {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        footer a {
            color: var(--accent-light);
            text-decoration: none;
        }

        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 2.5rem;
            }

            .nav-links {
                display: none;
            }

            .search-box {
                padding-right: 100px;
            }

            .features {
                grid-template-columns: 1fr;
            }
        }

        /* 输入时的光效 */
        .glow-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 16px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            box-shadow: 0 0 60px rgba(233, 69, 96, 0.3);
        }

        .search-box:focus ~ .glow-effect {
            opacity: 1;
        }
    </style>

<base target="_blank">
</head>
<body>
    <!-- 动态背景 -->
    <div class="bg-animation"></div>
    <div class="particles" id="particles"></div>

    <!-- 导航栏 -->
    <nav>
        <a href="#" class="logo">
            <div class="logo-icon">东</div>
            <span>东玉</span>
        </a>
        <div class="nav-links">
            <a href="#">首页</a>
            <a href="#">API</a>
            <a href="#">文档</a>
            <a href="#">关于</a>
            <button class="nav-btn">开始使用</button>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="main-container">
        <div class="hero-section">
            <div class="hero-badge">
                <span class="pulse-dot"></span>
                东玉大模型已就绪
            </div>
            <h1 class="hero-title">东玉搜索</h1>
            <p class="hero-subtitle">
                基于东玉大模型的智能搜索引擎，理解你的意图，提供精准答案
            </p>
        </div>

        <div class="search-container">
            <div style="position: relative;">
                <input 
                    type="text" 
                    class="search-box" 
                    id="searchInput"
                    placeholder="输入你想了解的内容..."
                    autocomplete="off"
                >
                <div class="glow-effect"></div>
                <button class="search-btn" id="searchBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </svg>
                    搜索
                </button>
            </div>
        </div>

        <div class="quick-tags">
            <span class="tag" onclick="setSearch('Python教程')">Python教程</span>
            <span class="tag" onclick="setSearch('人工智能')">人工智能</span>
            <span class="tag" onclick="setSearch('前端开发')">前端开发</span>
            <span class="tag" onclick="setSearch('数据分析')">数据分析</span>
            <span class="tag" onclick="setSearch('机器学习')">机器学习</span>
            <span class="tag" onclick="setSearch('最新资讯')">最新资讯</span>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color: var(--text-secondary);">东玉正在思考中...</p>
        </div>

        <div class="results-area" id="resultsArea"></div>

        <div class="features">
            <div class="feature-card">
                <div class="feature-icon">🧠</div>
                <div class="feature-title">深度理解</div>
                <div class="feature-desc">基于大模型的语义理解能力，准确把握搜索意图，不再局限于关键词匹配</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">⚡</div>
                <div class="feature-title">实时响应</div>
                <div class="feature-desc">毫秒级响应速度，即时获取答案，让信息检索如对话般流畅自然</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🔒</div>
                <div class="feature-title">隐私保护</div>
                <div class="feature-desc">端到端加密，不记录搜索历史，你的每一次查询都安全私密</div>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 东玉 DongYu. All rights reserved. | <a href="#">隐私政策</a> | <a href="#">服务条款</a></p>
    </footer>

    <script>
        // ===== 配置：你的 Vercel 后端地址 =====
        const API_BASE_URL = 'https://dongyu-api.vercel.app';
        // ======================================

        // 生成粒子
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // 搜索功能
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const loading = document.getElementById('loading');
        const resultsArea = document.getElementById('resultsArea');

        function setSearch(text) {
            searchInput.value = text;
            searchInput.focus();
        }

        async function performSearch() {
            const query = searchInput.value.trim();
            if (!query) {
                searchInput.focus();
                return;
            }

            // 显示加载，禁用按钮
            loading.classList.add('active');
            resultsArea.classList.remove('active');
            resultsArea.innerHTML = '';
            searchBtn.disabled = true;
            searchBtn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px;margin:0;"></div> 搜索中';

            try {
                // 调用 Vercel 后端（不暴露 API Key）
                const response = await fetch(API_BASE_URL + '/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || '请求失败');
                }

                const answer = data.answer || '未获取到回答';

                // 显示结果
                resultsArea.innerHTML = `
                    <div class="result-item">
                        <div class="result-title">🔍 ${escapeHtml(query)}</div>
                        <div class="result-meta">由 DeepSeek 大模型提供答案</div>
                        <div class="result-desc">${escapeHtml(answer)}</div>
                    </div>
                `;

            } catch (error) {
                console.error('搜索错误:', error);
                resultsArea.innerHTML = `
                    <div class="error-msg">
                        ❌ 搜索出错：${escapeHtml(error.message)}<br><br>
                        <small>请检查 Vercel 后端是否已正确部署。</small>
                    </div>
                `;
            } finally {
                loading.classList.remove('active');
                resultsArea.classList.add('active');
                searchBtn.disabled = false;
                searchBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg> 搜索`;
            }
        }

        // HTML 转义，防止 XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        // 输入框焦点效果
        searchInput.addEventListener('focus', () => {
            document.querySelector('.hero-section').style.opacity = '0.7';
            document.querySelector('.hero-section').style.transform = 'scale(0.95)';
            document.querySelector('.hero-section').style.transition = 'all 0.5s';
        });

        searchInput.addEventListener('blur', () => {
            if (!searchInput.value) {
                document.querySelector('.hero-section').style.opacity = '1';
                document.querySelector('.hero-section').style.transform = 'scale(1)';
            }
        });

        // 光标闪烁效果
        let cursorVisible = true;
        setInterval(() => {
            cursorVisible = !cursorVisible;
            if (searchInput === document.activeElement) {
                searchInput.style.caretColor = cursorVisible ? 'var(--accent)' : 'transparent';
            }
        }, 530);
    </script>
</body>
</html>
