<script>
    // ===== 改为当前站点相对路径，适配 Railway =====
    const API_BASE_URL = '';
    // ======================================

    // 生成粒子
    function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (10 + Math.random() * 10) + 's';
            container.appendChild(particle);
        }
    }
    createParticles();

    // 搜索功能
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const loading = document.getElementById('loading');
    const resultsArea = document.getElementById('resultsArea');

    function setSearch(text) {
        searchInput.value = text;
        searchInput.focus();
    }

    async function performSearch() {
        const query = searchInput.value.trim();
        if (!query) {
            searchInput.focus();
            return;
        }

        // 显示加载，禁用按钮
        loading.classList.add('active');
        resultsArea.classList.remove('active');
        resultsArea.innerHTML = '';
        searchBtn.disabled = true;
        searchBtn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px;margin:0;"></div> 搜索中';

        try {
            // 使用相对路径请求本地后端
            const response = await fetch(API_BASE_URL + '/api', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || '请求失败');
            }

            const answer = data.answer || '未获取到回答';

            // 显示结果
            resultsArea.innerHTML = `
                <div class="result-item">
                    <div class="result-title">🔍 ${escapeHtml(query)}</div>
                    <div class="result-meta">由 DeepSeek 大模型提供答案</div>
                    <div class="result-desc">${escapeHtml(answer)}</div>
                </div>
            `;

        } catch (error) {
            console.error('搜索错误:', error);
            resultsArea.innerHTML = `
                <div class="error-msg">
                    ❌ 搜索出错：${escapeHtml(error.message)}
                </div>
            `;
        } finally {
            loading.classList.remove('active');
            resultsArea.classList.add('active');
            searchBtn.disabled = false;
            searchBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg> 搜索`;
        }
    }

    // HTML 转义，防止 XSS
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    searchBtn.addEventListener('click', performSearch);
    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') performSearch();
    });

    // 输入框焦点效果
    searchInput.addEventListener('focus', () => {
        document.querySelector('.hero-section').style.opacity = '0.7';
        document.querySelector('.hero-section').style.transform = 'scale(0.95)';
        document.querySelector('.hero-section').style.transition = 'all 0.5s';
    });

    searchInput.addEventListener('blur', () => {
        if (!searchInput.value) {
            document.querySelector('.hero-section').style.opacity = '1';
            document.querySelector('.hero-section').style.transform = 'scale(1)';
        }
    });

    // 光标闪烁效果
    let cursorVisible = true;
    setInterval(() => {
        cursorVisible = !cursorVisible;
        if (searchInput === document.activeElement) {
            searchInput.style.caretColor = cursorVisible ? 'var(--accent)' : 'transparent';
        }
    }, 530);
</script>
